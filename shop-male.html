<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="description">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">
  <script src="https://kit.fontawesome.com/b47f15c436.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="../css/styles.css">
  <link rel="stylesheet" href="../css/jackets.css">
  <title>Rainydays | Shop Male</title>
</head>
<body>

  <header>
    <div class="header-start">
      <a href="../index.html" class="header-logo">rainydays.</a>
      <i class="fa-solid fa-bag-shopping fa-2x"></i>
    </div>

    <div class="header-end">
      <button><i class="fa-solid fa-bars fa-2x"></i></button>
      <label for="header-search"></label>
      <input type="search" id="header-search" placeholder="search...">
      <button><i class="fa-solid fa-magnifying-glass fa-2x"></i></button>
    </div>
  </header>

  <main>
    <section class="page-header">
      <h1>shop male</h1>
    </section>

    <section class="filter">
      <button class="secondary-btn">
        <i class="fa-solid fa-filter fa-1x"></i>
        <p>Filter</p>
      </button>
    </section>

    <section class="shop-grid">
      <a href="jackets/blaze.html">
        <div class="card">
          <div class="image">
            <img src="images/male-1.jpg" alt="male wearing an orange jacket on top of a mountain">
            <i class="fa-solid fa-bag-shopping fa-2x card-icon"></i>
          </div>
          <div class="text">
            <p class="name">Blaze</p>
            <div>
              <p class="price">$99</p>
              <p class="old-price">$149</p>
            </div>
          </div>
        </div>  
      </a>

      <a href="jackets/trek.html">
        <div class="card">
          <div class="image">
            <img src="images/male-2.jpg" alt="male wearing a red jacket and a backpack">
            <i class="fa-solid fa-bag-shopping fa-2x card-icon"></i>
          </div>
          <div class="text">
            <p class="name">Trek</p>
            <div>
              <p class="price">$99</p>
              <p class="old-price">$149</p>
            </div>
          </div>
        </div>  
      </a>

      <a href="jackets/nimbus.html">
        <div class="card">
          <div class="image">
            <img src="images/male-3.jpg" alt="man wearing a brown jacket on a mountain">
            <i class="fa-solid fa-bag-shopping fa-2x card-icon"></i>
          </div>
          <div class="text">
            <p class="name">Nimbus</p>
            <div>
              <p class="price">$99</p>
              <p class="old-price">$149</p>
            </div>
          </div>
        </div>  
      </a>
      
      <a href="jackets/summit.html">
        <div class="card">
          <div class="image">
            <img src="images/male-4.jpg" alt="male wearing a brown jacket on a sunny day">
            <i class="fa-solid fa-bag-shopping fa-2x card-icon"></i>
          </div>
          <div class="text">
            <p class="name">Summit</p>
            <div>
              <p class="price">$99</p>
              <p class="old-price">$149</p>
            </div>
          </div>
        </div>  
      </a>

      <a href="#">
        <div class="card">
          <div class="image">
            <img src="images/male-5.jpg" alt="need a fifth jacket">
            <i class="fa-solid fa-bag-shopping fa-2x card-icon"></i>
          </div>
          <div class="text">
            <p class="name">Jacket name</p>
            <div>
              <p class="price">$99</p>
              <p class="old-price">$149</p>
            </div>
          </div>
        </div>  
      </a>

    </section>
  </main>

  <footer>
    <img src="images/rainydays-logo.png" alt="">

    <div class="footer-nav">
      <p>Navigation</p>
      <ul>
        <li><a href="#">female jackets</a></li>
        <li><a href="#">male jackets</a></li>
        <li><a href="#">about</a></li>
        <li><a href="#">contact</a></li>
        <li><a href="#">privacy policy</a></li>
        <li><a href="#">terms & conditions</a></li>
        <li><a href="#">FAQ</a></li>
      </ul>
    </div>

    <div class="footer-newsletter">
      <label for="footer-newsletter-input">Sign up for our newsletter</label>
      <div class="footer-newsletter-flex">
        <input type="email" id="footer-newsletter-input" placeholder="example@mail.com">
        <button><i class="fa-solid fa-check fa-2x"></i></button>
      </div>
    </div>

    <p>&copy; 2024 Martine Kongsrud. All rights reserved.</p>
  </footer>


  <script src="js/script.js"></script>
</body>
</html>
